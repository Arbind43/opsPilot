# render.yaml — OpsPilot Render deployment configuration
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: opspilot-backend
    env: docker
    # Build context is the repo root so both backend/ and ai/ are accessible
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: GEMINI_EMBEDDING_MODEL
        value: "models/gemini-embedding-001"
      - key: LLM_PROVIDER
        value: "groq"
      - key: EMBEDDING_PROVIDER
        value: "gemini"
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://opspilot-frontend.onrender.com,http://localhost:5173,http://localhost:3000"
      - key: UPLOAD_DIR
        value: "./storage/uploads"
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: DEBUG
        value: "false"
