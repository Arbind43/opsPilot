version: "3.9"

services:
  # ── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - opspilot-net

  # ── Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - upload-data:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - opspilot-net

  # ── Celery Worker ────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    env_file:
      - .env
    volumes:
      - upload-data:/app/storage/uploads
    depends_on:
      - backend
      - redis
    networks:
      - opspilot-net

  # ── PostgreSQL ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opspilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opspilot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-opspilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opspilot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opspilot-net

  # ── Neo4j ────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_secret}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4j_secret} 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - opspilot-net

  # ── ChromaDB ─────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - opspilot-net

  # ── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opspilot-net

  # ── Nginx Reverse Proxy ─────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - opspilot-net

volumes:
  postgres-data:
  neo4j-data:
  chroma-data:
  redis-data:
  upload-data:

networks:
  opspilot-net:
    driver: bridge
